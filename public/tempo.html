<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0c0b0a" />
<meta name="color-scheme" content="dark" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Tempo" />
<meta name="format-detection" content="telephone=no" />
<title>tempo // OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* Tempo // OS — global styles. Theme tokens are CSS custom properties so a
   theme switch only needs to rewrite a handful of variables on :root. */

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  height: 100%;
}

body {
  background: var(--bg);
  font-family: 'Hanken Grotesk', system-ui, sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  /* iOS: don't auto-inflate text, and kill the grey tap flash on buttons. */
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior-y: none;
}

/* ── App shell layout (responsive + iOS safe areas) ─────────────────────────── */
.appScroll {
  -webkit-overflow-scrolling: touch;
}
.appContent {
  max-width: 1320px;
  margin: 0 auto;
  padding: 18px 22px 40px;
  padding-left: max(22px, env(safe-area-inset-left));
  padding-right: max(22px, env(safe-area-inset-right));
  padding-bottom: max(40px, env(safe-area-inset-bottom));
}
@media (max-width: 640px) {
  .appContent {
    padding-top: 14px;
    padding-left: max(13px, env(safe-area-inset-left));
    padding-right: max(13px, env(safe-area-inset-right));
    padding-bottom: max(32px, env(safe-area-inset-bottom));
  }
}

/* Top bar: nav scrolls horizontally on narrow screens instead of overflowing. */
.tb-nav {
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.tb-nav::-webkit-scrollbar {
  display: none;
}
.tb-nav > button {
  flex: 0 0 auto;
}
@media (max-width: 560px) {
  .tb-clock {
    display: none;
  }
}

/* On phones the page tabs move to a fixed bottom bar for one-handed reach,
   so hide the in-header nav and reserve room above the bar. */
.bottomNav {
  display: none;
}
@media (max-width: 720px) {
  .tb-nav {
    display: none !important;
  }
  .bottomNav {
    display: block;
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 40;
    background: var(--panel);
    border-top: 1px solid var(--line);
    padding-bottom: env(safe-area-inset-bottom);
    backdrop-filter: blur(8px);
  }
  .bottomNavRow {
    display: flex;
    align-items: stretch;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    padding: 4px 8px;
    padding-left: max(8px, env(safe-area-inset-left));
    padding-right: max(8px, env(safe-area-inset-right));
  }
  .bottomNavRow::-webkit-scrollbar {
    display: none;
  }
  /* Keep content clear of the fixed bar. */
  .appContent {
    padding-bottom: calc(76px + env(safe-area-inset-bottom));
  }
  /* Lift the Nateman orb above the bottom bar. */
  .natemanOrb {
    bottom: calc(84px + env(safe-area-inset-bottom)) !important;
  }
}

/* Comfortable tap targets on touch devices. */
@media (hover: none) and (pointer: coarse) {
  button {
    touch-action: manipulation;
  }
}

:root {
  --bg: #0c0b0a;
  --panel: #110f0d;
  --inset: #161412;
  --line: #1f1c19;
  --line2: #2a2622;
  --text: #ececea;
  --text-dim: #cfc8bf;
  --text-muted: #a59d93;
  --text-faint: #7a726a;
  --text-faint2: #5c554d;
  --accent: #e8a44c;
}

::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
::-webkit-scrollbar-thumb {
  background: var(--line);
  border-radius: 6px;
  border: 3px solid var(--bg);
}
::-webkit-scrollbar-thumb:hover {
  background: var(--line2);
}
::-webkit-scrollbar-track {
  background: transparent;
}

input {
  font-family: inherit;
}
input:focus {
  outline: none;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
@keyframes pulse {
  0%,
  100% {
    opacity: 0.4;
  }
  50% {
    opacity: 1;
  }
}
@keyframes pop {
  0% {
    transform: scale(0.5);
  }
  60% {
    transform: scale(1.15);
  }
  100% {
    transform: scale(1);
  }
}
@keyframes wave {
  0%,
  100% {
    transform: scaleY(0.25);
  }
  50% {
    transform: scaleY(1);
  }
}
@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}
.no-motion * {
  animation: none !important;
  transition: none !important;
}

#ovgrid {
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.ovcol {
  flex: 1 1 0;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
@media (max-width: 900px) {
  #ovgrid {
    flex-direction: column;
  }
  .ovcol {
    width: 100%;
  }
}

/* Eisenhower matrix — 2×2 at every width so all four quadrants stay in view;
   phones just get tighter cards. */
.eisengrid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  gap: 12px;
}
/* Phone Eisenhower view: a 2×2 board that fills the screen (no page scroll),
   each quadrant scrolls internally, and a floating + opens the add sheet —
   the in-page category bar, header, inline form and completed toggle hide. */
.matrixFab {
  display: none;
}
@media (max-width: 720px) {
  .tasksWrap {
    gap: 0 !important;
  }
  .tasksCats,
  .matrixHead,
  .matrixAdd,
  .matrixDone,
  .taskAreaLabel {
    display: none !important;
  }
  .matrixSection {
    background: transparent !important;
    border: none !important;
    padding: 0 !important;
  }
  .eisengrid {
    gap: 8px;
    grid-template-rows: 1fr 1fr;
    height: calc(100dvh - 142px - env(safe-area-inset-bottom));
  }
  .eisengrid > div {
    min-height: 0 !important;
    padding: 13px 13px !important;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .matrixFab {
    display: flex;
    align-items: center;
    justify-content: center;
    position: fixed;
    /* Left side so it doesn't collide with the Nateman orb (bottom-right). */
    left: max(18px, env(safe-area-inset-left));
    bottom: calc(86px + env(safe-area-inset-bottom));
    z-index: 46;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: var(--bg);
    font-size: 30px;
    font-weight: 300;
    line-height: 1;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.45);
  }
}

/* Bottom sheet (phone add-task) — backdrop + panel above the bottom bar. */
.sheetBackdrop {
  position: fixed;
  inset: 0;
  z-index: 49;
  background: color-mix(in srgb, var(--bg) 55%, transparent);
  backdrop-filter: blur(3px);
}
.addSheet {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 50;
  background: var(--panel);
  border-top: 1px solid var(--line2);
  border-radius: 18px 18px 0 0;
  padding: 18px 18px calc(20px + env(safe-area-inset-bottom));
  box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.5);
  animation: fadeUp 0.2s ease;
}

/* Calendar: month + day panel stack on phones. */
.calgrid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 360px;
  gap: 16px;
  align-items: start;
}
@media (max-width: 720px) {
  .calgrid {
    grid-template-columns: minmax(0, 1fr);
  }
}

/* Budget table reflows on phones: each row shows label + spent + a bar, with
   the budget/left columns dropped so nothing overlaps. */
@media (max-width: 720px) {
  .bHeadRow {
    display: none !important;
  }
  .bGroupRow {
    grid-template-columns: 1fr auto !important;
    grid-template-areas: 'name spent' 'bar bar' !important;
    row-gap: 7px !important;
  }
  .bGroupRow > :nth-child(1) {
    grid-area: name;
  }
  .bGroupRow > :nth-child(2) {
    display: none !important;
  }
  .bGroupRow > :nth-child(3) {
    grid-area: spent;
  }
  .bGroupRow > :nth-child(4) {
    display: none !important;
  }
  .bGroupRow > :nth-child(5) {
    grid-area: bar;
  }
  .bSubRow {
    grid-template-columns: 1fr auto !important;
    grid-template-areas: 'label spent' 'bar bar' !important;
    row-gap: 6px !important;
    padding: 10px 0 !important;
  }
  .bSubRow > :nth-child(1) {
    grid-area: label;
  }
  .bSubRow > :nth-child(2) {
    display: none !important;
  }
  .bSubRow > :nth-child(3) {
    grid-area: spent;
  }
  .bSubRow > :nth-child(4) {
    display: none !important;
  }
  .bSubRow > :nth-child(5) {
    grid-area: bar;
  }
  .bTotalRow {
    grid-template-columns: 1fr auto !important;
  }
  .bTotalRow > :nth-child(2),
  .bTotalRow > :nth-child(4),
  .bTotalRow > :nth-child(5) {
    display: none !important;
  }
}

/* Settings grids: minmax(0,1fr) tracks so number inputs never force the page
   wider than the screen; the 3-up grids drop to 2-up on phones. */
.setGrid2 {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}
.setGrid3 {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}
.setGrid2 > *,
.setGrid3 > * {
  min-width: 0;
}
@media (max-width: 720px) {
  .setGrid3 {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

/* Two-up page grids (Health, Finance) collapse to one column on phones so
   cards get full width instead of cramping and overlapping. */
.grid2 {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}
.budgetgrid {
  display: grid;
  grid-template-columns: 340px minmax(0, 1fr);
  gap: 16px;
  align-items: start;
}
@media (max-width: 720px) {
  .grid2 {
    grid-template-columns: minmax(0, 1fr);
    gap: 12px;
  }
  .budgetgrid {
    grid-template-columns: minmax(0, 1fr);
  }
}

@keyframes naFloat {
  0%,
  100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-9px);
  }
}
@keyframes naAura {
  0% {
    transform: rotate(0deg) scale(1);
  }
  50% {
    transform: rotate(180deg) scale(1.1);
  }
  100% {
    transform: rotate(360deg) scale(1);
  }
}
@keyframes naBlink {
  0%,
  90%,
  100% {
    transform: scaleY(1);
  }
  95% {
    transform: scaleY(0.12);
  }
}
@keyframes naRing {
  0% {
    transform: scale(0.7);
    opacity: 0.55;
  }
  100% {
    transform: scale(1.55);
    opacity: 0;
  }
}
@keyframes naTalk {
  0%,
  100% {
    height: 6%;
  }
  30% {
    height: 16%;
  }
  55% {
    height: 9%;
  }
  80% {
    height: 15%;
  }
}
@keyframes naLook {
  0%,
  16% {
    transform: translate(0, 0);
  }
  24%,
  38% {
    transform: translate(110%, -25%);
  }
  48%,
  62% {
    transform: translate(-80%, 12%);
  }
  72%,
  86% {
    transform: translate(45%, -55%);
  }
  100% {
    transform: translate(0, 0);
  }
}
@keyframes cheerPop {
  0% {
    transform: scale(1);
  }
  40% {
    transform: scale(1.06);
  }
  100% {
    transform: scale(1);
  }
}

/* The overview multi-column board reflows its cards; this keeps the grid item
   that should span full width (handled inline) from being split by the column
   layout. Sections opt out of column breaks above. */

</style>
</head>

<div id="root"></div>
