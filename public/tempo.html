<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0c0b0a" />
<meta name="color-scheme" content="dark" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Tempo" />
<meta name="format-detection" content="telephone=no" />
<title>tempo // OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* Tempo // OS — global styles. Theme tokens are CSS custom properties so a
   theme switch only needs to rewrite a handful of variables on :root. */

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  height: 100%;
}

body {
  background: var(--bg);
  font-family: 'Hanken Grotesk', system-ui, sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  /* iOS: don't auto-inflate text, and kill the grey tap flash on buttons. */
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior-y: none;
}

/* ── App shell layout (responsive + iOS safe areas) ─────────────────────────── */
.appScroll {
  -webkit-overflow-scrolling: touch;
}
.appContent {
  max-width: 1320px;
  margin: 0 auto;
  padding: 18px 22px 40px;
  padding-left: max(22px, env(safe-area-inset-left));
  padding-right: max(22px, env(safe-area-inset-right));
  padding-bottom: max(40px, env(safe-area-inset-bottom));
}
@media (max-width: 640px) {
  .appContent {
    padding-top: 14px;
    padding-left: max(13px, env(safe-area-inset-left));
    padding-right: max(13px, env(safe-area-inset-right));
    padding-bottom: max(32px, env(safe-area-inset-bottom));
  }
}

/* Top bar: nav scrolls horizontally on narrow screens instead of overflowing. */
.tb-nav {
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.tb-nav::-webkit-scrollbar {
  display: none;
}
.tb-nav > button {
  flex: 0 0 auto;
}
@media (max-width: 560px) {
  .tb-clock {
    display: none;
  }
}

/* Comfortable tap targets on touch devices. */
@media (hover: none) and (pointer: coarse) {
  button {
    touch-action: manipulation;
  }
}

:root {
  --bg: #0c0b0a;
  --panel: #110f0d;
  --inset: #161412;
  --line: #1f1c19;
  --line2: #2a2622;
  --text: #ececea;
  --text-dim: #cfc8bf;
  --text-muted: #a59d93;
  --text-faint: #7a726a;
  --text-faint2: #5c554d;
  --accent: #e8a44c;
}

::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}
::-webkit-scrollbar-thumb {
  background: var(--line);
  border-radius: 6px;
  border: 3px solid var(--bg);
}
::-webkit-scrollbar-thumb:hover {
  background: var(--line2);
}
::-webkit-scrollbar-track {
  background: transparent;
}

input {
  font-family: inherit;
}
input:focus {
  outline: none;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
@keyframes pulse {
  0%,
  100% {
    opacity: 0.4;
  }
  50% {
    opacity: 1;
  }
}
@keyframes pop {
  0% {
    transform: scale(0.5);
  }
  60% {
    transform: scale(1.15);
  }
  100% {
    transform: scale(1);
  }
}
@keyframes wave {
  0%,
  100% {
    transform: scaleY(0.25);
  }
  50% {
    transform: scaleY(1);
  }
}
@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}
.no-motion * {
  animation: none !important;
  transition: none !important;
}

#ovgrid {
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.ovcol {
  flex: 1 1 0;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
@media (max-width: 900px) {
  #ovgrid {
    flex-direction: column;
  }
  .ovcol {
    width: 100%;
  }
}

/* Eisenhower matrix — 2×2 on desktop, single column on phones. */
.eisengrid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
@media (max-width: 720px) {
  .eisengrid {
    grid-template-columns: 1fr;
  }
}

@keyframes naFloat {
  0%,
  100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-9px);
  }
}
@keyframes naAura {
  0% {
    transform: rotate(0deg) scale(1);
  }
  50% {
    transform: rotate(180deg) scale(1.1);
  }
  100% {
    transform: rotate(360deg) scale(1);
  }
}
@keyframes naBlink {
  0%,
  90%,
  100% {
    transform: scaleY(1);
  }
  95% {
    transform: scaleY(0.12);
  }
}
@keyframes naRing {
  0% {
    transform: scale(0.7);
    opacity: 0.55;
  }
  100% {
    transform: scale(1.55);
    opacity: 0;
  }
}
@keyframes naTalk {
  0%,
  100% {
    height: 6%;
  }
  30% {
    height: 16%;
  }
  55% {
    height: 9%;
  }
  80% {
    height: 15%;
  }
}
@keyframes naLook {
  0%,
  16% {
    transform: translate(0, 0);
  }
  24%,
  38% {
    transform: translate(110%, -25%);
  }
  48%,
  62% {
    transform: translate(-80%, 12%);
  }
  72%,
  86% {
    transform: translate(45%, -55%);
  }
  100% {
    transform: translate(0, 0);
  }
}
@keyframes cheerPop {
  0% {
    transform: scale(1);
  }
  40% {
    transform: scale(1.06);
  }
  100% {
    transform: scale(1);
  }
}

/* The overview multi-column board reflows its cards; this keeps the grid item
   that should span full width (handled inline) from being split by the column
   layout. Sections opt out of column breaks above. */

</style>
</head>

<div id="root"></div>
